<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZORAIB-MD | Pair & Deploy</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --blue: #1E90FF;
      --yellow: #FFD700;
      --dark: #0a0a0a;
      --card: rgba(15,15,25,0.78);
    }
    body {
      font-family: 'Montserrat', sans-serif;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      background: url('https://files.catbox.moe/8i7djw.jpg') no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: -3;
    }
    #particles-js { position: fixed; width: 100%; height: 100%; z-index: -2; }
    .cyber-grid {
      position: fixed; inset: 0; z-index: -1;
      background: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: grid 70s linear infinite;
      opacity: 0.25;
    }
    @keyframes grid { to { transform: translate(-60px, -60px); } }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px 15px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 35px;
      position: relative;
      z-index: 1;
      padding-top: 140px;
    }

    /* Card Styling */
    .card {
      border-radius: 16px;
      padding: 35px 25px;
      text-align: center;
      transition: all 0.4s ease;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }
    .card i { font-size: 3.5rem; margin-bottom: 20px; }
    .card h2 { font-size: 1.9rem; margin-bottom: 15px; }
    .card p { font-size: 1.1rem; margin-bottom: 25px; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
      border-radius: 10px;
      background: rgba(0,0,0,0.2);
      text-decoration: none;
      transition: all 0.35s;
    }
    .btn:hover { transform: scale(1.05); background: rgba(255,255,255,0.2); }

    /* Specific Colors */
    .features .card:nth-child(1) { background: var(--blue); }
    .features .card:nth-child(1) i { color: #00f0ff; }
    .features .card:nth-child(2) { background: var(--yellow); color: #000; }
    .features .card:nth-child(2) i { color: #000; }

    /* Floating Social Buttons */
    .floating-buttons {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .float-btn {
      width: 65px; height: 65px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 30px; text-decoration: none;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      transition: all 0.4s ease; position: relative; overflow: hidden;
    }
    .float-btn::before {
      content: '';
      position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.5s;
    }
    .float-btn:hover::before { opacity: 1; }
    .float-btn:hover { transform: scale(1.2) translateY(-8px); }

    .float-btn span.tooltip {
      position: absolute; right: 80px; top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.9); color: #fff;
      padding: 8px 16px; border-radius: 8px; font-size: 0.95rem;
      opacity: 0; pointer-events: none;
      transition: all 0.3s ease;
    }
    .float-btn:hover span.tooltip { opacity: 1; right: 90px; }

    .whatsapp { background: #25D366; }
    .facebook { background: #1877F2; }

    @media (max-width: 768px) {
      .container { padding-top: 160px; gap: 20px; }
      .float-btn { width: 58px; height: 58px; font-size: 27px; }
      .float-btn span.tooltip { font-size: 0.85rem; right: 75px; padding: 6px 12px; }
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>
  <div class="cyber-grid"></div>

  <!-- Floating Buttons -->
  <div class="floating-buttons">
    <a href="https://api.whatsapp.com/send?phone=+923xxxxxxxxx&text=Hello%20Zoraib-MD!" target="_blank" class="float-btn whatsapp">
      <i class="fab fa-whatsapp"></i>
      <span class="tooltip">Chat on WhatsApp</span>
    </a>
    <a href="https://facebook.com/yourpage" target="_blank" class="float-btn facebook">
      <i class="fab fa-facebook-f"></i>
      <span class="tooltip">Follow on Facebook</span>
    </a>
  </div>

  <div class="container features">
    <div class="card">
      <i class="fas fa-key"></i>
      <h2>Pair Code Generate</h2>
      <p>Apna number daalo aur turant encrypted pair code mil jayega.</p>
      <a href="/pair" class="btn">Generate Pair Code</a>
    </div>

    <div class="card">
      <i class="fas fa-rocket"></i>
      <h2>Deploy Zoraib-MD</h2>
      <p>One-click setup -- Premium features ke saath apna bot minutes mein live.</p>
      <a href="https://github.com/Arslan-MD/Arslan_MD" target="_blank" class="btn">Deploy Now</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 60, density: { enable: true, value_area: 800 } },
        color: { value: "#00ffcc" },
        shape: { type: "circle" },
        opacity: { value: 0.4, random: true },
        size: { value: 3, random: true },
        line_linked: { enable: true, distance: 120, color: "#00ffcc", opacity: 0.25, width: 1 },
        move: { enable: true, speed: 1.2, direction: "none", random: true, straight: false, out_mode: "out" }
      },
      interactivity: {
        detect_on: "canvas",
        events: { onhover: { enable: true, mode: "repulse" }, onclick: { enable: true, mode: "push" } },
        modes: { repulse: { distance: 80 }, push: { particles_nb: 4 } }
      },
      retina_detect: true
    });
  </script>

</body>
</html>
